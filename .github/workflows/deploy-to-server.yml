name: Build and deploy to server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build backend
        run: cd backend && cargo build --release

      - name: Package deploy artifact
        run: |
          tar -czf ducia-deploy.tar.gz --exclude=node_modules --exclude=.git --exclude=config/docs.json \
            dist/ src/ public/ index.html package.json package-lock.json vite.config.js backend/

      - name: Copy artifact to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          source: "ducia-deploy.tar.gz"
          target: "/tmp/ducia-deploy.tar.gz"

      - name: Remote deploy commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          script: |
            set -euo pipefail
            REMOTE_PATH=${{ secrets.SERVER_PATH }}
            mkdir -p "$REMOTE_PATH"
            cd "$REMOTE_PATH"
            cp config/docs.json /tmp/docs.json.bak 2>/dev/null || true
            tar -xzf /tmp/ducia-deploy.tar.gz --overwrite -C "$REMOTE_PATH"
            if [ -f /tmp/docs.json.bak ]; then mv /tmp/docs.json.bak config/docs.json; fi
            mkdir -p docs
            cd backend
            cargo build --release
            pkill -f "ducia-listing-framework" 2>/dev/null || true
            nohup ./target/release/ducia-listing-framework > /dev/null 2>&1 &