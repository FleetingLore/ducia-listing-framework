name: Publish to crates.io

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'  # 例如 v0.2.0, v0.2.0-alpha
  workflow_dispatch:                # 也允许手动触发

jobs:
  # ─── 先发核心库 ───
  publish-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish ducia-core
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}
        working-directory: backend/ducia-core

  # ─── 再发 4 个插件 ───
  publish-plugins:
    needs: publish-core
    runs-on: ubuntu-latest
    strategy:
      matrix:
        crate:
          - ducia-storage-fs
          - ducia-storage-sqlite
          - ducia-auth-simple
          - ducia-auth-db
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish ${{ matrix.crate }}
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}
        working-directory: backend/plugins/${{ matrix.crate }}
